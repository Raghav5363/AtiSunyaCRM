services:
  - type: web
    name: atisunya-crm
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: REACT_APP_API_URL
        value: https://atisunyacrm.onrender.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: IOS_BUNDLE_ID
        value: com.atisunya.crm
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_PUSH_KEY
        sync: false
      - key: APPLE_PUSH_USE_SANDBOX
        value: false
